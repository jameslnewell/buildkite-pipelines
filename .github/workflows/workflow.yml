name: 🤖 CI/CD

on:
  push:

jobs:
  check-formatting:
    name: "💅 Check formatting"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - uses: pnpm/action-setup@v2
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install
      - run: pnpm run check:formatting

  check-typing:
    name: "👮‍♂️ Check typing"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - uses: pnpm/action-setup@v2
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install
      - run: pnpm run check:typing

  test:
    name: "🧪 Run tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - uses: pnpm/action-setup@v2
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - uses: actions/cache@v3
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - run: pnpm install
      - run: pnpm run test

  build-package:
    name: "👷‍♂️📦 Building package"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - uses: pnpm/action-setup@v2
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install
      - run: pnpm run build:types && pnpm run build:transpile
      # Tar every package's dist so the artifact preserves the
      # `packages/<name>/dist` layout regardless of how many packages exist.
      - run: tar -czf package-dist.tar.gz packages/*/dist
      - uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: package-dist.tar.gz

  build-pages:
    name: "👷‍♂️📚 Building pages"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - uses: pnpm/action-setup@v2
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install
      - run: pnpm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/buildkite-pipelines/dist/pages

  publish-package:
    name: "⬆️📦 Publishing to NPM"
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push version bump commits and tags
      id-token: write # to verify the publish originates from an appropriate source
    if: github.ref == 'refs/heads/main'
    needs:
      - check-formatting
      - check-typing
      - test
      - build-pages
      - build-package
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3
        with:
          # Use a PAT so the bump commit + tag can be pushed back to `main` —
          # the default GITHUB_TOKEN is blocked by the `main: require CI`
          # ruleset (github-actions[bot] is not in the bypass list).
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
      - uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v2
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: package-dist
      - run: tar -xzf package-dist.tar.gz
      # Unshallow and fetch tags so `changeset publish` can tell which package
      # versions are already released and tag the new ones correctly.
      - run: git fetch --unshallow --tags || git fetch --tags
      - run: pnpm run changeset version
      # Format the files `changeset version` writes (CHANGELOG.md, package.json)
      # so the bump commit always passes prettier — important because the
      # commit lands on main with [skip ci], so the formatting check doesn't
      # run on it directly; without this, format drift here would surface as
      # a red `check:formatting` on the next PR.
      - run: pnpm run fix:formatting
      - id: version
        run: echo "version=$(jq -r .version packages/buildkite-pipelines/package.json)" >> $GITHUB_OUTPUT
      - run: git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - run: git config --global user.name "github-actions[bot]"
      # [skip ci] stops the PAT-driven push from cascading into a second
      # `🤖 CI/CD` run.
      - run: git commit -am "Bumped package versions 📦 [skip ci]" || echo "Versions not updated. Nothing to commit."
        shell: bash {0} # opt-out of exit on error
      - run: git push
      # Publish every workspace package whose version isn't yet on npm, and tag
      # each release. `changeset publish` shells out to `npm publish`, so OIDC
      # trusted publishing still applies (no token set); provenance is enabled
      # via NPM_CONFIG_PROVENANCE.
      - run: pnpm run release
        env:
          NPM_CONFIG_PROVENANCE: "true"
      - run: git push --follow-tags

  docker-push:
    name: "⬆️🐳 Publishing to DockerHub"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - check-formatting
      - check-typing
      - test
      - build-pages
      - build-package
      - publish-package
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Skip the build when the image for this version is already on DockerHub
      # (`docker manifest inspect` exits 0 when the tag exists). The version is
      # the buildkite-pipelines package version published by `publish-package`,
      # since the image bundles that CLI.
      - id: image
        env:
          VERSION: ${{ needs.publish-package.outputs.version }}
        run: |
          if docker manifest inspect "jameslnewell/buildkite-pipelines:$VERSION" > /dev/null 2>&1; then
            echo "Image jameslnewell/buildkite-pipelines:$VERSION already exists — skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v2
        if: steps.image.outputs.exists == 'false'
        with:
          push: true
          context: .
          file: docker/Dockerfile
          tags: jameslnewell/buildkite-pipelines:latest,jameslnewell/buildkite-pipelines:${{ needs.publish-package.outputs.version }}
      # doesn't work with DH PAT 😔
      # - uses: peter-evans/dockerhub-description@v2
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #     readme-filepath: docker/README.md

  pages-upload:
    name: "⬆️🕸️ Publishing to Github Pages"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - check-formatting
      - check-typing
      - test
      - build-pages
      - build-package
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    steps:
      - uses: actions/checkout@v3
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4
